# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
---
exclude: |
  (?x)^(
    .*third_party.*
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        name: Check for added large files
        args: ['--maxkb=2048']
      - id: trailing-whitespace
        name: Check for trailing whitespace
      - id: end-of-file-fixer
        name: Ensure files end with a newline
      - id: check-yaml
        name: Check YAML files for syntax errors
      - id: check-json
        name: Check JSON files for syntax errors
      - id: check-merge-conflict
        name: Check for merge conflict markers
      - id: check-case-conflict
        name: Check for case conflicts in filenames
      - id: check-symlinks
        name: Check for broken symlinks
      - id: detect-private-key
        name: Check for private keys in files
  - repo: local
    hooks:
      - id: reuse
        name: Check SPDX License Headers
        entry: scripts/reuse_skip_wrapper.py
        additional_dependencies: ["reuse==6.2.0"]
        language: python
        stages: [pre-commit, pre-merge-commit, pre-push, manual]
        types: [text]
        exclude_types: [batch, svg, json, markdown]
  - repo: https://github.com/google/yapf
    rev: v0.43.0
    hooks:
      - id: yapf
        name: Autoformat Python Files
        args: ["--in-place", "--parallel"]
        stages: [pre-commit, pre-merge-commit, pre-push, manual]
  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        name: Autoformat Python Imports
        args: ["--quiet"]
        stages: [pre-commit, pre-merge-commit, pre-push, manual]
  - repo: https://github.com/PyCQA/autoflake
    rev: v2.3.0
    hooks:
      - id: autoflake
        name: Remove Unused Python Imports
        args:
          - "--remove-all-unused-imports"
          - "--ignore-init-module-imports"
          - "--in-place"
        stages: [pre-commit, pre-merge-commit, pre-push, manual]
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.33.0
    hooks:
      - id: yamllint
        name: Lint YAML Files
        stages: [pre-commit, pre-merge-commit, pre-push, manual]
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v21.1.2
    hooks:
      - id: clang-format
        name: Autoformat C/C++ Files
        args: ["-i"]
        stages: [pre-commit, pre-merge-commit, pre-push, manual]
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt
